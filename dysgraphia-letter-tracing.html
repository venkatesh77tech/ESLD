<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>ESLD – Letter Tracing ✏️</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0b1120;--card:rgba(255,255,255,.07);--border:rgba(255,255,255,.12);--yellow:#fbbf24;--green:#22c55e;--blue:#38bdf8;--orange:#fb923c;--red:#ef4444;--purple:#a78bfa}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:#f1f5f9;min-height:100vh;padding:0 0 40px}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 50% at 20% 10%,rgba(251,191,36,.08),transparent),radial-gradient(ellipse 60% 40% at 80% 80%,rgba(56,189,248,.07),transparent);z-index:0;pointer-events:none}

/* TOPBAR */
.topbar{position:relative;z-index:10;display:flex;align-items:center;gap:14px;padding:16px 28px;background:rgba(11,17,32,.9);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);flex-wrap:wrap}
.back-btn{padding:8px 16px;border-radius:999px;border:1px solid var(--border);background:transparent;color:#94a3b8;cursor:pointer;font-weight:800;font-family:'Nunito',sans-serif;font-size:.83rem;transition:.2s}
.back-btn:hover{color:#f1f5f9;background:rgba(255,255,255,.08)}
.game-title{font-family:'Fredoka One';font-size:1.5rem;background:linear-gradient(135deg,var(--yellow),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.top-pills{margin-left:auto;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.xp-pill{padding:7px 16px;border-radius:999px;background:rgba(251,191,36,.12);border:1px solid rgba(251,191,36,.25);font-weight:800;color:var(--yellow);font-size:.85rem}
.lives{display:flex;gap:4px}
.life{font-size:20px;transition:.3s}
.life.lost{opacity:.2;filter:grayscale(1)}

/* LAYOUT */
.page{position:relative;z-index:1;max-width:920px;margin:28px auto;padding:0 20px;display:grid;grid-template-columns:1fr 1fr;gap:24px}
@media(max-width:700px){.page{grid-template-columns:1fr}}

/* LETTER SELECTOR */
.panel{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:22px}
.panel-title{font-family:'Fredoka One';font-size:1rem;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.letter-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.ltr-btn{width:38px;height:38px;border-radius:10px;border:2px solid rgba(251,191,36,.2);background:rgba(251,191,36,.05);color:#f1f5f9;font-family:'Fredoka One';font-size:1rem;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center}
.ltr-btn:hover{background:rgba(251,191,36,.15);border-color:rgba(251,191,36,.4)}
.ltr-btn.active{background:var(--yellow);color:#000;border-color:var(--yellow);transform:scale(1.1)}
.ltr-btn.mastered{background:rgba(34,197,94,.15);border-color:rgba(34,197,94,.4);color:var(--green)}

/* CANVAS AREA */
.canvas-panel{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:22px;display:flex;flex-direction:column;align-items:center;gap:14px}
.canvas-wrap{position:relative;width:100%;max-width:340px}
.guide-letter{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Fredoka One';font-size:200px;color:rgba(251,191,36,.08);user-select:none;pointer-events:none;line-height:1}
#tracing-canvas{border-radius:18px;background:rgba(255,255,255,.03);border:2px solid rgba(251,191,36,.2);cursor:crosshair;touch-action:none;width:100%;max-width:340px;display:block}

/* STATS CHIPS */
.chips{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.chip{background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:10px;padding:7px 14px;font-size:.8rem;font-weight:700;display:flex;align-items:center;gap:5px}

/* CONTROLS */
.controls{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.ctrl-btn{padding:10px 20px;border-radius:999px;border:none;font-family:'Nunito',sans-serif;font-weight:800;font-size:.88rem;cursor:pointer;transition:.2s;display:flex;align-items:center;gap:6px}
.ctrl-btn:hover{transform:translateY(-2px)}
.btn-clear{background:rgba(255,255,255,.1);color:#f1f5f9}
.btn-speak{background:linear-gradient(135deg,var(--blue),var(--purple));color:#fff}
.btn-analyze{background:linear-gradient(135deg,var(--yellow),var(--orange));color:#000}
.btn-next{background:linear-gradient(135deg,var(--green),#16a34a);color:#fff}

/* FEEDBACK */
.feedback-box{width:100%;border-radius:16px;padding:16px 20px;text-align:center;font-weight:700;font-size:.95rem;line-height:1.5;transition:.3s;border:2px solid var(--border)}
.fb-idle{border-color:rgba(255,255,255,.1);color:#64748b}
.fb-good{border-color:rgba(34,197,94,.4);background:rgba(34,197,94,.07);color:var(--green)}
.fb-bad{border-color:rgba(251,146,60,.4);background:rgba(251,146,60,.07);color:var(--orange)}

/* SCORE PANEL */
.score-panel{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:20px}
.score-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.score-big{font-family:'Fredoka One';font-size:2.2rem;color:var(--yellow)}
.prog-bar{height:10px;background:rgba(255,255,255,.07);border-radius:5px;overflow:hidden;margin-bottom:6px}
.prog-fill{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--yellow),var(--green));transition:width .6s ease}
.prog-lbl{font-size:.75rem;color:#64748b;font-weight:700}
.mode-btns{display:flex;gap:6px;margin-top:8px}
.mode-btn{flex:1;padding:8px;border-radius:10px;border:1px solid var(--border);background:transparent;color:#64748b;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;font-size:.8rem;transition:.2s}
.mode-btn.active,.mode-btn:hover{background:rgba(251,191,36,.12);border-color:rgba(251,191,36,.3);color:var(--yellow)}

/* RESULT OVERLAY */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);z-index:100;display:none;place-items:center}
.overlay.show{display:grid}
.result-box{background:rgba(11,17,32,.98);border:2px solid rgba(34,197,94,.3);border-radius:28px;padding:40px 48px;text-align:center;animation:popIn .4s cubic-bezier(.34,1.56,.64,1);max-width:400px;width:90%}
@keyframes popIn{from{transform:scale(.85);opacity:0}}
.result-icon{font-size:72px;display:block;margin-bottom:14px;animation:float 2s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.result-title{font-family:'Fredoka One';font-size:2rem;margin-bottom:6px}
.result-sub{color:#64748b;margin-bottom:20px;font-size:.9rem}
.result-stats{display:flex;gap:14px;justify-content:center;margin-bottom:22px;flex-wrap:wrap}
.rs{background:rgba(255,255,255,.06);border-radius:14px;padding:12px 20px;text-align:center}
.rs .rn{font-family:'Fredoka One';font-size:1.6rem}
.rs .rl{font-size:.72rem;color:#64748b}
.res-btns{display:flex;gap:10px;justify-content:center}
.res-btn{padding:12px 26px;border-radius:999px;border:none;font-weight:900;cursor:pointer;font-family:'Nunito',sans-serif;font-size:.9rem;transition:.2s}
.res-btn:hover{transform:translateY(-2px)}
.res-primary{background:linear-gradient(135deg,var(--green),#16a34a);color:#fff}
.res-sec{background:rgba(255,255,255,.08);color:#f1f5f9;border:1px solid var(--border)}

/* TOAST */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(60px);background:linear-gradient(135deg,var(--green),var(--blue));color:#fff;padding:12px 26px;border-radius:999px;font-weight:800;font-size:.88rem;z-index:200;opacity:0;transition:.35s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* CONFETTI */
.conf{position:fixed;width:9px;height:9px;top:-10px;border-radius:2px;animation:fall linear forwards;pointer-events:none;z-index:300}
@keyframes fall{to{transform:translateY(105vh) rotate(720deg);opacity:0}}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <button class="back-btn" onclick="location.href='dysgraphia-games.html'">← Games</button>
  <div class="game-title">✏️ Smart Letter Tracing</div>
  <div class="top-pills">
    <div class="xp-pill">⚡ <span id="navXp">0</span> XP</div>
    <div class="lives" id="livesEl"></div>
  </div>
</div>

<div class="page">

  <!-- LEFT: Letter Selector + Score -->
  <div style="display:flex;flex-direction:column;gap:20px">
    <div class="panel">
      <div class="panel-title">🔤 Choose a Letter</div>
      <div class="letter-grid" id="letterGrid"></div>
    </div>

    <div class="score-panel">
      <div class="score-row">
        <div>
          <div style="font-size:.75rem;color:#64748b;font-weight:800;text-transform:uppercase;letter-spacing:.5px">Score</div>
          <div class="score-big" id="scoreDisp">0</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:.75rem;color:#64748b;font-weight:800;margin-bottom:4px">Mode</div>
          <div class="mode-btns">
            <button class="mode-btn active" id="modeUpper" onclick="setMode('upper',this)">ABC</button>
            <button class="mode-btn" id="modeLower" onclick="setMode('lower',this)">abc</button>
          </div>
        </div>
      </div>
      <div class="prog-lbl">Letters Mastered</div>
      <div class="prog-bar"><div class="prog-fill" id="masterBar" style="width:0%"></div></div>
      <div class="prog-lbl" id="masterLbl">0 / 26</div>
    </div>
  </div>

  <!-- RIGHT: Canvas -->
  <div class="canvas-panel">
    <div style="font-family:'Fredoka One';font-size:.9rem;color:#64748b">Trace this letter:</div>
    <div style="font-family:'Fredoka One';font-size:5rem;color:var(--yellow);line-height:1" id="letterDisplay">A</div>

    <div class="canvas-wrap">
      <div class="guide-letter" id="guideLetter">A</div>
      <canvas id="tracing-canvas" width="340" height="320"></canvas>
    </div>

    <div class="chips">
      <div class="chip">📏 Coverage: <span id="statCov">0%</span></div>
      <div class="chip">✨ Smooth: <span id="statSmooth">—</span></div>
      <div class="chip">✏️ Strokes: <span id="statStrokes">0</span></div>
    </div>

    <div class="controls">
      <button class="ctrl-btn btn-speak" onclick="speakLetter()">🔊 Hear</button>
      <button class="ctrl-btn btn-clear" onclick="clearCanvas()">🗑️ Clear</button>
      <button class="ctrl-btn btn-analyze" onclick="analyzeTracing()">🤖 Check</button>
      <button class="ctrl-btn btn-next" onclick="nextLetter()">⏭️ Next</button>
    </div>

    <div class="feedback-box fb-idle" id="feedbackBox">
      Start tracing the letter shown above ✏️
    </div>
  </div>

</div>

<!-- RESULT OVERLAY -->
<div class="overlay" id="resultOverlay">
  <div class="result-box">
    <span class="result-icon" id="resIcon">🏆</span>
    <div class="result-title" id="resTitle">Amazing!</div>
    <div class="result-sub" id="resSub">You completed the session</div>
    <div class="result-stats">
      <div class="rs"><div class="rn" style="color:var(--yellow)" id="resXp">0</div><div class="rl">XP Earned</div></div>
      <div class="rs"><div class="rn" style="color:var(--green)" id="resCorrect">0</div><div class="rl">Correct</div></div>
      <div class="rs"><div class="rn" style="color:var(--blue)" id="resAcc">0%</div><div class="rl">Accuracy</div></div>
    </div>
    <div class="res-btns">
      <button class="res-btn res-primary" onclick="restartGame()">🔄 Play Again</button>
      <button class="res-btn res-sec" onclick="location.href='dysgraphia-games.html'">🎮 All Games</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const sid = sessionStorage.getItem('studentId') || 'guest';
const LETTERS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
let currentLetter='A', isDrawing=false, strokes=0, points=[];
let mode='upper', score=0, xpEarned=0, correct=0, total=0;
let lives=3, masteredSet=new Set();
let sessionActive=true;

// Load existing data
let globalXP = Number(localStorage.getItem('dysgraphia-xp-'+sid)) || 0;
document.getElementById('navXp').textContent = globalXP;

// Build letter grid
function buildGrid(){
  const grid=document.getElementById('letterGrid');
  grid.innerHTML='';
  LETTERS.forEach(l=>{
    const b=document.createElement('button');
    b.className='ltr-btn'+(masteredSet.has(l)?' mastered':'')+(l===currentLetter?' active':'');
    b.textContent=mode==='upper'?l:l.toLowerCase();
    b.onclick=()=>selectLetter(l);
    grid.appendChild(b);
  });
}
function selectLetter(l){
  currentLetter=l;
  const disp=mode==='upper'?l:l.toLowerCase();
  document.getElementById('letterDisplay').textContent=disp;
  document.getElementById('guideLetter').textContent=disp;
  clearCanvas();
  buildGrid();
}
function setMode(m,btn){
  mode=m;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  selectLetter(currentLetter);
}
function nextLetter(){
  const idx=LETTERS.indexOf(currentLetter);
  selectLetter(LETTERS[(idx+1)%26]);
}

// CANVAS
const canvas=document.getElementById('tracing-canvas');
const ctx=canvas.getContext('2d');
ctx.lineWidth=9;ctx.lineCap='round';ctx.lineJoin='round';ctx.strokeStyle='#fbbf24';

function getPos(e){
  const r=canvas.getBoundingClientRect();
  const scaleX=canvas.width/r.width;
  const scaleY=canvas.height/r.height;
  if(e.touches)return{x:(e.touches[0].clientX-r.left)*scaleX,y:(e.touches[0].clientY-r.top)*scaleY};
  return{x:(e.clientX-r.left)*scaleX,y:(e.clientY-r.top)*scaleY};
}
canvas.addEventListener('mousedown',e=>{isDrawing=true;const p=getPos(e);ctx.beginPath();ctx.moveTo(p.x,p.y);points.push(p);strokes++;upd();});
canvas.addEventListener('mousemove',e=>{if(!isDrawing)return;const p=getPos(e);ctx.lineTo(p.x,p.y);ctx.stroke();points.push(p);});
canvas.addEventListener('mouseup',()=>{isDrawing=false;});
canvas.addEventListener('touchstart',e=>{e.preventDefault();isDrawing=true;const p=getPos(e);ctx.beginPath();ctx.moveTo(p.x,p.y);points.push(p);strokes++;upd();},{passive:false});
canvas.addEventListener('touchmove',e=>{e.preventDefault();if(!isDrawing)return;const p=getPos(e);ctx.lineTo(p.x,p.y);ctx.stroke();points.push(p);},{passive:false});
canvas.addEventListener('touchend',()=>{isDrawing=false;});
function upd(){document.getElementById('statStrokes').textContent=strokes;}

function clearCanvas(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  strokes=0;points=[];
  document.getElementById('statStrokes').textContent=0;
  document.getElementById('statCov').textContent='0%';
  document.getElementById('statSmooth').textContent='—';
  setFeedback('idle','Start tracing the letter shown above ✏️');
}

function setFeedback(type,msg){
  const fb=document.getElementById('feedbackBox');
  fb.textContent=msg;
  fb.className='feedback-box fb-'+type;
}

function analyzeTracing(){
  if(points.length<8){setFeedback('bad','✏️ Please trace something first!');return;}
  total++;
  const coverage=Math.min(100,Math.round(points.length/2.8));
  document.getElementById('statCov').textContent=coverage+'%';

  let smooth=0;
  for(let i=2;i<points.length;i++){
    const dx1=points[i-1].x-points[i-2].x,dy1=points[i-1].y-points[i-2].y;
    const dx2=points[i].x-points[i-1].x,dy2=points[i].y-points[i-1].y;
    const a=Math.abs(Math.atan2(dy2,dx2)-Math.atan2(dy1,dx1));
    if(a<0.6)smooth++;
  }
  const smoothPct=Math.round((smooth/Math.max(1,points.length-2))*100);
  document.getElementById('statSmooth').textContent=smoothPct>70?'Smooth ✨':'Practice More';

  const isGood=coverage>25&&smoothPct>50;
  if(isGood){
    correct++;
    masteredSet.add(currentLetter);
    const earnedXP=15;
    xpEarned+=earnedXP;score+=10;
    globalXP+=earnedXP;
    localStorage.setItem('dysgraphia-xp-'+sid,globalXP);
    document.getElementById('navXp').textContent=globalXP;
    document.getElementById('scoreDisp').textContent=score;
    const pct=Math.round((masteredSet.size/26)*100);
    document.getElementById('masterBar').style.width=pct+'%';
    document.getElementById('masterLbl').textContent=masteredSet.size+' / 26';
    buildGrid();
    const msgs=['🌟 Excellent! Your "'+currentLetter+'" looks great!','✅ Perfect tracing! Keep going!','🎉 Brilliant stroke work!','💎 Amazing accuracy!'];
    setFeedback('good',msgs[Math.floor(Math.random()*msgs.length)]+' Coverage: '+coverage+'% · Smooth: '+smoothPct+'%');
    confetti();showToast('+15 XP ⚡ Great tracing!');
  } else {
    lives=Math.max(0,lives-1);
    renderLives();
    const tips=['🐢 Try to trace more slowly','✏️ Follow the guide letter shape','🌊 Keep strokes smooth and steady','📐 Stay within the guide lines'];
    setFeedback('bad',tips[Math.floor(Math.random()*tips.length)]+' (Coverage: '+coverage+'%)');
    if(lives<=0)endSession();
  }
}

function renderLives(){
  const el=document.getElementById('livesEl');
  el.innerHTML='';
  for(let i=0;i<3;i++){
    el.innerHTML+='<span class="life'+(i>=lives?' lost':'')+'">❤️</span>';
  }
}
renderLives();

function speakLetter(){
  if(!('speechSynthesis' in window))return;
  const u=new SpeechSynthesisUtterance(currentLetter.toLowerCase());
  u.rate=0.8;u.pitch=1.2;
  speechSynthesis.speak(u);
  // Also speak phonetic
  const phonics={A:'A sounds like Aah',B:'B sounds like Buh',C:'C sounds like Kuh',D:'D sounds like Duh',E:'E sounds like Eh',F:'F sounds like Fff',G:'G sounds like Guh',H:'H sounds like Huh',I:'I sounds like Ih',J:'J sounds like Juh',K:'K sounds like Kuh',L:'L sounds like Lll',M:'M sounds like Mmm',N:'N sounds like Nnn',O:'O sounds like Oh',P:'P sounds like Puh',Q:'Q sounds like Kwuh',R:'R sounds like Rrr',S:'S sounds like Sss',T:'T sounds like Tuh',U:'U sounds like Uh',V:'V sounds like Vvv',W:'W sounds like Wuh',X:'X sounds like Ks',Y:'Y sounds like Yuh',Z:'Z sounds like Zzz'};
  setTimeout(()=>{
    const u2=new SpeechSynthesisUtterance(phonics[currentLetter]||currentLetter);
    u2.rate=0.75;u2.pitch=1.1;
    speechSynthesis.speak(u2);
  },600);
}

function endSession(){
  sessionActive=false;
  const acc=total>0?Math.round((correct/total)*100):0;
  const icon=acc>=80?'🏆':acc>=50?'🌟':'💪';
  document.getElementById('resIcon').textContent=icon;
  document.getElementById('resTitle').textContent=acc>=80?'Amazing!':acc>=50?'Good Job!':'Keep Practicing!';
  document.getElementById('resSub').textContent='You completed a tracing session';
  document.getElementById('resXp').textContent=xpEarned;
  document.getElementById('resCorrect').textContent=correct;
  document.getElementById('resAcc').textContent=acc+'%';
  document.getElementById('resultOverlay').classList.add('show');

  // Save history
  const hist=JSON.parse(localStorage.getItem('ml-history-'+sid)||'[]');
  hist.unshift({date:new Date().toISOString().split('T')[0],game:'Letter Tracing',mode,accuracy:acc,correct,wrong:total-correct,coins:xpEarned});
  localStorage.setItem('ml-history-'+sid,JSON.stringify(hist.slice(0,50)));
  const gp=Number(localStorage.getItem('gamesPlayed-'+sid)||0)+1;
  localStorage.setItem('gamesPlayed-'+sid,gp);
  const totalCoins=Number(localStorage.getItem('coins-'+sid)||0)+xpEarned;
  localStorage.setItem('coins-'+sid,totalCoins);
}

function restartGame(){
  document.getElementById('resultOverlay').classList.remove('show');
  score=0;xpEarned=0;correct=0;total=0;lives=3;sessionActive=true;
  document.getElementById('scoreDisp').textContent=0;
  renderLives();
  selectLetter('A');
}

function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

function confetti(){
  const cols=['#fbbf24','#22c55e','#38bdf8','#a78bfa','#fb923c'];
  for(let i=0;i<30;i++){
    const c=document.createElement('div');c.className='conf';
    c.style.cssText=`left:${Math.random()*100}vw;background:${cols[i%cols.length]};animation-duration:${1.4+Math.random()*1.6}s;animation-delay:${Math.random()*.4}s;border-radius:${Math.random()>.5?'50%':'2px'}`;
    document.body.appendChild(c);setTimeout(()=>c.remove(),3000);
  }
}

// Init
buildGrid();selectLetter('A');
</script>
</body>
</html>
