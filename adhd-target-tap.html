<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Target Tap – ESLD ADHD</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800;900&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0d0f1e;--card:#141728;--border:rgba(255,255,255,.08);--pink:#f72585;--purple:#7209b7;--yellow:#ffd93d;--green:#06d6a0;--orange:#ff7b2e;--blue:#4cc9f0;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:#f1f5f9;min-height:100vh;overflow:hidden;
  background-image:radial-gradient(ellipse 60% 50% at 20% 20%,rgba(247,37,133,.08),transparent),radial-gradient(ellipse 50% 40% at 80% 80%,rgba(114,9,183,.06),transparent);}
.topbar{display:flex;align-items:center;gap:14px;padding:12px 22px;background:rgba(13,15,30,.9);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);flex-wrap:wrap;position:relative;z-index:50}
.back-btn{padding:6px 14px;border-radius:999px;border:1px solid var(--border);background:transparent;color:#94a3b8;cursor:pointer;font-weight:700;font-family:'Nunito',sans-serif;font-size:.78rem;transition:.18s}
.back-btn:hover{background:rgba(255,255,255,.08);color:#f1f5f9}
.tb-title{font-family:'Baloo 2',sans-serif;font-size:1.2rem;font-weight:900;background:linear-gradient(135deg,var(--pink),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hud{margin-left:auto;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.hud-box{background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:12px;padding:6px 14px;text-align:center}
.hud-n{font-family:'Baloo 2',sans-serif;font-size:1.2rem;font-weight:900}
.hud-l{font-size:.6rem;color:#64748b;font-weight:700;text-transform:uppercase;letter-spacing:.5px}

/* ARENA */
#arena{position:absolute;top:64px;left:0;right:0;bottom:0;overflow:hidden;cursor:crosshair}
/* TARGET CARD shown at top */
.target-strip{
  position:absolute;top:12px;left:50%;transform:translateX(-50%);
  background:rgba(247,37,133,.12);border:1px solid rgba(247,37,133,.35);
  border-radius:14px;padding:8px 20px;z-index:10;
  display:flex;align-items:center;gap:10px;
  font-weight:800;font-size:.88rem;color:var(--pink);
  white-space:nowrap;
}
.ts-emoji{font-size:22px}
/* TARGETS */
.target{
  position:absolute;
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:28px;
  cursor:pointer;
  transition:transform .1s;
  animation:targetAppear .25s cubic-bezier(.34,1.56,.64,1);
  user-select:none;
  z-index:5;
}
@keyframes targetAppear{from{transform:scale(0);opacity:0}}
.target:hover{transform:scale(1.1)}
.target.correct{box-shadow:0 0 30px rgba(247,37,133,.5);animation:targetAppear .25s cubic-bezier(.34,1.56,.64,1),pulse 1s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 20px rgba(247,37,133,.4)}50%{box-shadow:0 0 40px rgba(247,37,133,.7)}}
.target.wrong{box-shadow:0 0 20px rgba(255,255,255,.12)}
/* HIT EFFECTS */
.hit-good{position:absolute;pointer-events:none;z-index:20;font-size:24px;font-weight:900;font-family:'Baloo 2',sans-serif;color:var(--green);animation:hitPop .7s ease forwards;white-space:nowrap}
.hit-bad{position:absolute;pointer-events:none;z-index:20;font-size:24px;font-weight:900;font-family:'Baloo 2',sans-serif;color:#ef4444;animation:hitPop .7s ease forwards;white-space:nowrap}
@keyframes hitPop{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-50px) scale(.6)}}
/* COUNTDOWN */
.countdown-overlay{position:absolute;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;background:rgba(13,15,30,.9);flex-direction:column;gap:14px}
.countdown-n{font-family:'Baloo 2',sans-serif;font-size:8rem;font-weight:900;background:linear-gradient(135deg,var(--pink),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:countPop .8s cubic-bezier(.34,1.56,.64,1)}
@keyframes countPop{from{transform:scale(2);opacity:0}to{transform:scale(1);opacity:1}}
.countdown-txt{font-size:1rem;color:#94a3b8;font-weight:700}
/* RESULT */
.overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.8);backdrop-filter:blur(10px);display:none;place-items:center}
.overlay.show{display:grid}
.result-box{background:var(--card);border:2px solid rgba(247,37,133,.3);border-radius:28px;padding:36px;text-align:center;max-width:400px;width:90%;animation:popIn .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes popIn{from{transform:scale(.8);opacity:0}}
.res-ic{font-size:64px;display:block;margin-bottom:10px}
.res-h{font-family:'Baloo 2',sans-serif;font-size:1.7rem;font-weight:900;background:linear-gradient(135deg,var(--pink),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
.res-stats{display:flex;gap:10px;justify-content:center;margin:14px 0 20px;flex-wrap:wrap}
.rs{background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:12px;padding:10px 15px}
.rn{font-family:'Baloo 2',sans-serif;font-size:1.5rem;font-weight:900}.rl{font-size:.64rem;color:#64748b;text-transform:uppercase;letter-spacing:.5px}
.res-btns{display:flex;gap:10px;justify-content:center}
.rbtn{padding:11px 22px;border-radius:999px;border:none;cursor:pointer;font-weight:900;font-family:'Nunito',sans-serif;font-size:.86rem;transition:.2s}
.rbtn:hover{transform:translateY(-2px)}
.rbtn-p{background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff}
.rbtn-s{background:rgba(255,255,255,.08);color:#94a3b8;border:1px solid var(--border)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;padding:10px 22px;border-radius:999px;font-weight:900;font-size:.83rem;z-index:300;opacity:0;transition:.35s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.conf{position:fixed;border-radius:2px;animation:confFall linear forwards;pointer-events:none;z-index:400}
@keyframes confFall{to{transform:translateY(105vh) rotate(720deg);opacity:0}}
</style>
</head>
<body>
<div class="topbar">
  <button class="back-btn" onclick="location.href='adhd-games.html'">← Games</button>
  <div class="tb-title">🎯 Target Tap</div>
  <div class="hud">
    <div class="hud-box"><div class="hud-n" style="color:var(--yellow)"  id="hScore">0</div><div class="hud-l">Score</div></div>
    <div class="hud-box"><div class="hud-n" style="color:var(--green)"   id="hHits">0</div><div class="hud-l">Hits</div></div>
    <div class="hud-box"><div class="hud-n" style="color:#ef4444"        id="hMiss">0</div><div class="hud-l">Miss</div></div>
    <div class="hud-box"><div class="hud-n" style="color:var(--blue)"    id="hTime">60</div><div class="hud-l">Time</div></div>
    <div class="hud-box"><div class="hud-n" style="color:var(--orange)"  id="hLevel">1</div><div class="hud-l">Level</div></div>
  </div>
</div>

<div id="arena">
  <!-- Target strip -->
  <div class="target-strip">
    <span class="ts-emoji" id="tsEmoji">⭐</span>
    <span>Tap only the <strong id="tsTarget">STARS</strong>!</span>
  </div>
  <!-- Countdown overlay -->
  <div class="countdown-overlay" id="countdownOverlay">
    <div class="countdown-n" id="countdownN">3</div>
    <div class="countdown-txt">Get ready to tap!</div>
  </div>
</div>

<div class="overlay" id="resultOverlay">
  <div class="result-box">
    <span class="res-ic" id="resIc">🏆</span>
    <div class="res-h" id="resH">Target Master!</div>
    <div class="res-stats">
      <div class="rs"><div class="rn" style="color:var(--yellow)" id="resScore">0</div><div class="rl">Score</div></div>
      <div class="rs"><div class="rn" style="color:var(--green)"  id="resHits">0</div><div class="rl">Hits</div></div>
      <div class="rs"><div class="rn" style="color:var(--blue)"   id="resAcc">0%</div><div class="rl">Accuracy</div></div>
      <div class="rs"><div class="rn" style="color:var(--orange)" id="resXP">0</div><div class="rl">XP</div></div>
    </div>
    <div class="res-btns">
      <button class="rbtn rbtn-p" onclick="restart()">🔄 Play Again</button>
      <button class="rbtn rbtn-s" onclick="location.href='adhd-games.html'">🎮 All Games</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const SID = sessionStorage.getItem('studentId')||'guest';
let globalXP = Number(localStorage.getItem('adhd_xp_'+SID))||0;

const TARGET_SETS = [
  {target:'⭐',name:'STARS',  distractors:['❤️','🔵','🟩','🌙','🔺']},
  {target:'❤️',name:'HEARTS', distractors:['⭐','🔵','🟩','🌙','🔺']},
  {target:'🔵',name:'CIRCLES',distractors:['⭐','❤️','🟩','🌙','🔺']},
  {target:'🟩',name:'SQUARES',distractors:['⭐','❤️','🔵','🌙','🔺']},
];

let currentSet=null, score=0, hits=0, miss=0, xpEarned=0;
let timeLeft=60, gameRunning=false, level=1, spawnInterval=null, timerInterval=null;
let taps=0;

const COLORS=['#f72585','#7209b7','#4cc9f0','#06d6a0','#ffd93d','#ff7b2e','#a78bfa','#f472b6'];

function setTarget(){
  currentSet=TARGET_SETS[Math.floor(Math.random()*TARGET_SETS.length)];
  document.getElementById('tsEmoji').textContent=currentSet.target;
  document.getElementById('tsTarget').textContent=currentSet.name;
}

function spawnTarget(){
  if(!gameRunning) return;
  const arena=document.getElementById('arena');
  const isCorrect=Math.random()<0.45;
  const emoji=isCorrect?currentSet.target:currentSet.distractors[Math.floor(Math.random()*currentSet.distractors.length)];
  const size=60+Math.floor(Math.random()*30);
  const x=Math.random()*(arena.offsetWidth-size-20)+10;
  const y=70+Math.random()*(arena.offsetHeight-size-80);
  const color=COLORS[Math.floor(Math.random()*COLORS.length)];
  const lifespan=Math.max(800,2500-level*150);

  const el=document.createElement('div');
  el.className='target '+(isCorrect?'correct':'wrong');
  el.style.cssText=`left:${x}px;top:${y}px;width:${size}px;height:${size}px;background:${color}22;border:3px solid ${color};font-size:${size*.4}px`;
  el.textContent=emoji;

  el.onclick=(e)=>{
    e.stopPropagation();
    taps++;
    if(isCorrect){
      hits++;score+=10*level;xpEarned+=5;globalXP+=5;
      showHit(x+size/2,y+size/2,true,'+'+10*level);
      confetti();
      if(hits%5===0){level++;document.getElementById('hLevel').textContent=level;showToast('Level Up! ⬆️ Level '+level);}
    } else {
      miss++;score=Math.max(0,score-5);
      showHit(x+size/2,y+size/2,false,'Oops!');
    }
    el.remove();
    updateHUD();
  };

  arena.appendChild(el);
  setTimeout(()=>el.remove(),lifespan);
}

function showHit(x,y,good,txt){
  const arena=document.getElementById('arena');
  const el=document.createElement('div');
  el.className=good?'hit-good':'hit-bad';
  el.style.left=x+'px';el.style.top=y+'px';
  el.textContent=txt;
  arena.appendChild(el);
  setTimeout(()=>el.remove(),700);
}

function updateHUD(){
  document.getElementById('hScore').textContent=score;
  document.getElementById('hHits').textContent=hits;
  document.getElementById('hMiss').textContent=miss;
}

function startCountdown(){
  let n=3;
  const el=document.getElementById('countdownN');
  const ov=document.getElementById('countdownOverlay');
  el.textContent=n;
  const iv=setInterval(()=>{
    n--;
    if(n===0){el.textContent='GO!';el.style.color='#06d6a0';}
    else if(n<0){clearInterval(iv);ov.style.display='none';startGame();}
    else{el.textContent=n;el.style.color='';}
  },800);
}

function startGame(){
  gameRunning=true;setTarget();
  const spawnRate=Math.max(400,900-level*50);
  spawnInterval=setInterval(spawnTarget,spawnRate);
  timerInterval=setInterval(()=>{
    timeLeft--;document.getElementById('hTime').textContent=timeLeft;
    if(timeLeft<=0){clearInterval(timerInterval);clearInterval(spawnInterval);endGame();}
  },1000);
  setTimeout(()=>{if(gameRunning)spawnTarget();},200);
}

function endGame(){
  gameRunning=false;
  const acc=taps>0?Math.round((hits/taps)*100):0;
  localStorage.setItem('adhd_xp_'+SID,globalXP);
  document.getElementById('resIc').textContent=acc>=70?'🏆':acc>=50?'⭐':'💪';
  document.getElementById('resH').textContent=acc>=70?'Target Master!':acc>=50?'Good Aim!':'Keep Practising!';
  document.getElementById('resScore').textContent=score;
  document.getElementById('resHits').textContent=hits;
  document.getElementById('resAcc').textContent=acc+'%';
  document.getElementById('resXP').textContent=xpEarned;
  document.getElementById('resultOverlay').classList.add('show');
  const hist=JSON.parse(localStorage.getItem('ml-history-'+SID)||'[]');
  hist.unshift({date:new Date().toISOString().split('T')[0],game:'Target Tap',mode:'level'+level,accuracy:acc,correct:hits,wrong:miss,coins:xpEarned});
  localStorage.setItem('ml-history-'+SID,JSON.stringify(hist.slice(0,60)));
  const tc=Number(localStorage.getItem('coins-'+SID)||0)+xpEarned;localStorage.setItem('coins-'+SID,tc);
  const gp=Number(localStorage.getItem('gamesPlayed-'+SID)||0)+1;localStorage.setItem('gamesPlayed-'+SID,gp);
}

function restart(){
  document.getElementById('resultOverlay').classList.remove('show');
  document.getElementById('countdownOverlay').style.display='flex';
  document.getElementById('countdownN').textContent='3';
  document.getElementById('countdownN').style.color='';
  clearInterval(spawnInterval);clearInterval(timerInterval);
  document.getElementById('arena').querySelectorAll('.target').forEach(t=>t.remove());
  score=0;hits=0;miss=0;xpEarned=0;timeLeft=60;level=1;taps=0;gameRunning=false;
  updateHUD();document.getElementById('hTime').textContent=60;document.getElementById('hLevel').textContent=1;
  startCountdown();
}

function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}
function confetti(){if(Math.random()>.6)return;const c=['#f72585','#ffd93d','#06d6a0','#4cc9f0'];for(let i=0;i<12;i++){const el=document.createElement('div');el.className='conf';el.style.cssText=`left:${Math.random()*100}vw;width:7px;height:7px;background:${c[i%c.length]};animation-duration:${1+Math.random()}s;border-radius:${Math.random()>.5?'50%':'2px'}`;document.body.appendChild(el);setTimeout(()=>el.remove(),2500)}}

startCountdown();
</script>
</body>
</html>
