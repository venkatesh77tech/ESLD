<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>ESLD – Missing Letter Game 🔤</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#060e1a;
  --card:#0d1829;
  --border:rgba(255,255,255,.1);
  --green:#00e676;--green2:#00c853;
  --red:#ff5252;
  --yellow:#ffd740;
  --blue:#40c4ff;
  --purple:#ea80fc;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Nunito',sans-serif;background:var(--bg);color:#eef2ff;
  min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden;
}

/* ── BG ── */
.bg-fx{position:fixed;inset:0;z-index:0;pointer-events:none}
.bg-circle{
  position:absolute;border-radius:50%;filter:blur(100px);opacity:.1;
  animation:bgPulse 8s ease-in-out infinite alternate;
}
.bc1{width:600px;height:600px;background:var(--green);top:-200px;left:-200px;animation-delay:0s}
.bc2{width:500px;height:500px;background:var(--blue);right:-150px;bottom:-150px;animation-delay:-4s}
.bc3{width:350px;height:350px;background:var(--purple);left:40%;top:30%;animation-delay:-2s}
@keyframes bgPulse{0%{transform:scale(1)}100%{transform:scale(1.3) translate(30px,-20px)}}

/* ── TOP BAR ── */
.topbar{
  position:relative;z-index:10;
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 24px;
  background:rgba(6,14,26,.9);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
}
.back-btn{
  display:flex;align-items:center;gap:6px;padding:8px 18px;
  border-radius:999px;border:1px solid var(--border);background:rgba(255,255,255,.06);
  color:#c0cce0;cursor:pointer;font-weight:700;font-family:'Nunito',sans-serif;
  font-size:.85rem;transition:.3s;
}
.back-btn:hover{background:rgba(255,255,255,.12);color:#fff}
.top-brand{font-family:'Fredoka',sans-serif;font-size:1.2rem;
  background:linear-gradient(90deg,var(--green),var(--blue));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.stu-badge{
  padding:7px 14px;border-radius:999px;
  background:rgba(255,255,255,.07);border:1px solid var(--border);
  font-size:.82rem;font-weight:700;
}

/* ── HUD ── */
.hud{
  position:relative;z-index:5;
  display:grid;grid-template-columns:repeat(6,1fr);gap:10px;
  padding:14px 24px;
  background:rgba(13,24,41,.8);
  border-bottom:1px solid var(--border);
}
.hud-pill{
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);
  border-radius:14px;padding:10px 8px;text-align:center;
}
.hud-pill .hp-label{font-size:.65rem;font-weight:700;color:#4a5880;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.hud-pill .hp-val{font-family:'Fredoka',sans-serif;font-size:1.2rem}
#hudScore .hp-val{color:var(--green)}
#hudWrong .hp-val{color:var(--red)}
#hudCoins .hp-val{color:var(--yellow)}

/* ── LEVEL PILLS ── */
.level-tabs{
  position:relative;z-index:5;
  display:flex;gap:8px;padding:12px 24px;
  background:rgba(6,14,26,.6);border-bottom:1px solid var(--border);
}
.lvl-tab{
  padding:6px 14px;border-radius:999px;border:1px solid var(--border);
  background:rgba(255,255,255,.04);color:#4a5880;font-weight:800;font-size:.8rem;
  cursor:pointer;transition:.3s;font-family:'Nunito',sans-serif;
}
.lvl-tab:hover{background:rgba(255,255,255,.1);color:#eef2ff}
.lvl-tab.active{background:rgba(0,230,118,.15);border-color:rgba(0,230,118,.4);color:var(--green)}
.lvl-tab.completed{background:rgba(0,200,83,.1);border-color:rgba(0,200,83,.3);color:#69f0ae}
.lvl-tab.locked{opacity:.35;cursor:not-allowed}

/* ── MAIN GAME AREA ── */
.game-wrap{
  position:relative;z-index:5;
  flex:1;display:grid;grid-template-columns:1.2fr .8fr;gap:20px;
  padding:20px 24px;max-width:1200px;width:100%;margin:0 auto;
}

/* ── GAME CARD ── */
.game-card{
  background:var(--card);border:2px solid var(--border);
  border-radius:28px;padding:28px;
  display:flex;flex-direction:column;align-items:center;gap:16px;
  transition:.3s;
}
.game-card.correct-flash{
  border-color:var(--green)!important;
  box-shadow:0 0 40px rgba(0,230,118,.3);
  animation:correctPop .5s ease;
}
.game-card.wrong-flash{
  border-color:var(--red)!important;
  box-shadow:0 0 40px rgba(255,82,82,.3);
  animation:shake .4s ease;
}
@keyframes correctPop{0%{transform:scale(1)}50%{transform:scale(1.03)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}

/* mode badge */
.mode-badge{
  padding:6px 16px;border-radius:999px;font-size:.78rem;font-weight:800;
  border:1px solid;letter-spacing:.5px;
}
.mode-badge.easy{background:rgba(0,230,118,.12);border-color:rgba(0,230,118,.3);color:var(--green)}
.mode-badge.medium{background:rgba(255,215,64,.12);border-color:rgba(255,215,64,.3);color:var(--yellow)}
.mode-badge.hard{background:rgba(255,82,82,.12);border-color:rgba(255,82,82,.3);color:var(--red)}

/* word display */
.word-display{
  font-family:'Fredoka',sans-serif;font-size:3.8rem;letter-spacing:10px;
  text-align:center;padding:24px 32px;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
  border-radius:20px;width:100%;
  animation:wordFadeIn .4s ease;
  min-height:100px;display:flex;align-items:center;justify-content:center;
}
@keyframes wordFadeIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}

.blank{
  color:var(--green);
  text-shadow:0 0 20px rgba(0,230,118,.5);
  animation:blinkBlank 1s ease-in-out infinite;
}
@keyframes blinkBlank{0%,100%{opacity:1}50%{opacity:.4}}

/* input */
.answer-wrap{width:100%;position:relative}
.answer-input{
  width:100%;padding:16px 20px;border-radius:16px;
  border:2px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);
  color:#eef2ff;font-family:'Fredoka',sans-serif;font-size:1.6rem;
  text-align:center;letter-spacing:4px;outline:none;transition:.3s;
}
.answer-input:focus{border-color:var(--green);box-shadow:0 0 0 4px rgba(0,230,118,.15)}
.answer-input::placeholder{font-size:1rem;letter-spacing:1px;color:#4a5880;font-family:'Nunito',sans-serif}

/* feedback */
.feedback{
  font-family:'Fredoka',sans-serif;font-size:1.2rem;min-height:32px;text-align:center;
  transition:.3s;padding:6px 16px;border-radius:12px;
}
.feedback.ok{color:var(--green);background:rgba(0,230,118,.1)}
.feedback.bad{color:var(--red);background:rgba(255,82,82,.1)}

/* buttons */
.btns-row{display:flex;gap:10px;width:100%;flex-wrap:wrap;justify-content:center}
.btn{
  padding:12px 22px;border-radius:999px;border:none;font-weight:900;
  font-family:'Nunito',sans-serif;font-size:.9rem;cursor:pointer;
  display:flex;align-items:center;gap:6px;transition:.3s;
}
.btn:hover{transform:translateY(-2px)}
.btn-check{background:linear-gradient(135deg,var(--green2),var(--green));color:#002200;flex:1}
.btn-check:hover{box-shadow:0 6px 20px rgba(0,230,118,.4)}
.btn-skip{background:rgba(255,255,255,.07);border:1px solid var(--border);color:#8899bb}
.btn-skip:hover{background:rgba(255,255,255,.12);color:#eef2ff}
.btn-speak{background:rgba(64,196,255,.1);border:1px solid rgba(64,196,255,.25);color:var(--blue)}
.btn-speak:hover{background:rgba(64,196,255,.18)}
.btn-speak.speaking{animation:speakPulse 1s ease-in-out infinite}
@keyframes speakPulse{0%,100%{box-shadow:0 0 0 0 rgba(64,196,255,.4)}50%{box-shadow:0 0 0 10px rgba(64,196,255,0)}}

/* hint strip */
.hint-strip{
  width:100%;padding:10px 16px;border-radius:12px;
  background:rgba(234,128,252,.08);border:1px solid rgba(234,128,252,.2);
  font-size:.85rem;color:#ea80fc;font-weight:700;display:none;
  align-items:center;gap:8px;text-align:center;justify-content:center;
}
.hint-strip.show{display:flex}

/* ── IMAGE PANEL ── */
.img-panel{
  background:var(--card);border:2px solid var(--border);
  border-radius:28px;padding:20px;
  display:flex;flex-direction:column;align-items:center;gap:16px;
}
.img-container{
  width:100%;flex:1;display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,.03);border-radius:20px;min-height:200px;overflow:hidden;
}
.word-img{
  max-width:100%;max-height:260px;border-radius:14px;
  transition:opacity .3s;object-fit:contain;
}
.img-label{
  font-family:'Fredoka',sans-serif;font-size:1.4rem;color:#8899bb;text-align:center;
}
/* emoji fallback */
.img-emoji{font-size:100px;text-align:center;animation:emojiPop .5s ease}
@keyframes emojiPop{from{transform:scale(0)}to{transform:scale(1)}}

/* progress bar in img panel */
.session-progress{width:100%}
.sp-label{display:flex;justify-content:space-between;font-size:.75rem;color:#4a5880;font-weight:700;margin-bottom:6px}
.sp-track{height:8px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden}
.sp-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--green2),var(--green));transition:width .4s ease}

/* streak counter */
.streak{
  display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:999px;
  background:rgba(255,215,64,.1);border:1px solid rgba(255,215,64,.25);color:var(--yellow);
  font-weight:800;font-size:.85rem;
}
.streak-fire{animation:fireShake .3s ease-in-out infinite alternate}
@keyframes fireShake{from{transform:rotate(-5deg)}to{transform:rotate(5deg)}}

/* ── CONFETTI ── */
.confetti-wrap{position:fixed;inset:0;pointer-events:none;z-index:1000;display:none}
.confetti-wrap.show{display:block}
.conf-dot{
  position:absolute;width:10px;height:10px;border-radius:2px;
  animation:confettiFall linear forwards;
}
@keyframes confettiFall{
  0%{transform:translateY(-20px) rotate(0deg);opacity:1}
  100%{transform:translateY(110vh) rotate(720deg);opacity:0}
}

/* ── LEVEL COMPLETE MODAL ── */
.modal-wrap{
  position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(12px);
  z-index:500;display:none;place-items:center;
}
.modal-wrap.open{display:grid}
.modal-box{
  background:#0d1829;border:1px solid var(--border);border-radius:28px;
  padding:36px;width:min(500px,90vw);text-align:center;
  animation:modalIn .5s cubic-bezier(.34,1.56,.64,1);
}
@keyframes modalIn{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}
.modal-emoji{font-size:72px;display:block;margin-bottom:12px;animation:emojiPop .5s .1s ease both}
.modal-title{font-family:'Fredoka',sans-serif;font-size:2rem;color:var(--green);margin-bottom:8px}
.modal-sub{color:#8899bb;margin-bottom:24px;font-size:.95rem}
.modal-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:24px}
.ms{background:rgba(255,255,255,.05);border-radius:14px;padding:14px;text-align:center}
.ms-n{font-family:'Fredoka',sans-serif;font-size:1.8rem}
.ms-l{font-size:.72rem;color:#4a5880;font-weight:700}
.modal-btns{display:flex;gap:10px;flex-direction:column}
.modal-btn{
  padding:13px;border-radius:999px;border:none;font-weight:900;font-size:.95rem;
  cursor:pointer;font-family:'Nunito',sans-serif;transition:.3s;
}
.modal-btn:hover{transform:translateY(-2px)}
.modal-btn-next{background:linear-gradient(135deg,var(--green2),var(--green));color:#002200}
.modal-btn-next:hover{box-shadow:0 8px 24px rgba(0,230,118,.4)}
.modal-btn-games{background:rgba(255,255,255,.07);border:1px solid var(--border);color:#c0cce0}

@media(max-width:800px){
  .game-wrap{grid-template-columns:1fr;padding:14px}
  .hud{grid-template-columns:repeat(3,1fr);padding:10px 14px}
  .level-tabs{padding:10px 14px;flex-wrap:wrap}
}
</style>
</head>
<body>

<!-- BG -->
<div class="bg-fx">
  <div class="bg-circle bc1"></div>
  <div class="bg-circle bc2"></div>
  <div class="bg-circle bc3"></div>
</div>

<!-- CONFETTI -->
<div class="confetti-wrap" id="confettiWrap"></div>

<!-- TOP BAR -->
<div class="topbar">
  <button class="back-btn" onclick="location.href='dyslexia-games.html'">⬅ Back</button>
  <span class="top-brand">🔤 Missing Letter Game</span>
  <div class="stu-badge">🎓 <span id="stuId">--</span></div>
</div>

<!-- HUD -->
<div class="hud">
  <div class="hud-pill" id="hudModeP"><div class="hp-label">Mode</div><div class="hp-val" id="hudMode">Easy</div></div>
  <div class="hud-pill"><div class="hp-label">Level</div><div class="hp-val" id="hudLevel">1</div></div>
  <div class="hud-pill"><div class="hp-label">Question</div><div class="hp-val" id="hudQ">1/5</div></div>
  <div class="hud-pill" id="hudScore"><div class="hp-label">Correct</div><div class="hp-val" id="hudScoreVal">0</div></div>
  <div class="hud-pill" id="hudWrong"><div class="hp-label">Wrong</div><div class="hp-val" id="hudWrongVal">0</div></div>
  <div class="hud-pill" id="hudCoins"><div class="hp-label">Coins</div><div class="hp-val" id="hudCoinsVal">0</div></div>
</div>

<!-- LEVEL TABS -->
<div class="level-tabs" id="levelTabs"><!-- rendered by JS --></div>

<!-- GAME AREA -->
<div class="game-wrap">

  <!-- LEFT: GAME CARD -->
  <div class="game-card" id="gameCard">

    <span class="mode-badge easy" id="modeBadge">Easy Mode</span>

    <div class="word-display" id="wordDisplay">_ _ _</div>

    <div class="answer-wrap">
      <input class="answer-input" id="answerInput"
        placeholder="Type the missing letter or the full word"
        autocomplete="off" autocorrect="off" spellcheck="false"/>
    </div>

    <div class="hint-strip" id="hintStrip">💡 Hint: <span id="hintText"></span></div>

    <div class="feedback" id="feedback"></div>

    <div class="btns-row">
      <button class="btn btn-check" onclick="checkAnswer()">✅ Check</button>
      <button class="btn btn-skip" onclick="skipQ()">⏭ Skip</button>
      <button class="btn btn-speak" id="speakBtn" onclick="speakQ()">🔊 Hear It</button>
    </div>

    <div class="streak" id="streakBadge" style="display:none">
      <span class="streak-fire">🔥</span> <span id="streakCount">0</span> Streak!
    </div>

  </div>

  <!-- RIGHT: IMAGE PANEL -->
  <div class="img-panel">
    <div class="img-container" id="imgContainer">
      <div class="img-emoji" id="wordEmoji">❓</div>
    </div>
    <div class="img-label" id="imgLabel">Guess the word!</div>
    <div class="streak" style="width:100%;justify-content:center">
      🪙 Session Coins: <b id="sessionCoins" style="color:var(--yellow)">0</b>
    </div>
    <div class="session-progress">
      <div class="sp-label"><span>Session Progress</span><span id="spLabel">0/5</span></div>
      <div class="sp-track"><div class="sp-fill" id="spFill" style="width:0%"></div></div>
    </div>
  </div>

</div>

<!-- LEVEL COMPLETE MODAL -->
<div class="modal-wrap" id="modalWrap">
  <div class="modal-box">
    <span class="modal-emoji" id="modalEmoji">🎉</span>
    <div class="modal-title" id="modalTitle">Level Complete!</div>
    <div class="modal-sub" id="modalSub">Great job! You finished the level.</div>
    <div class="modal-stats">
      <div class="ms"><div class="ms-n" id="mAccuracy" style="color:var(--green)">0%</div><div class="ms-l">Accuracy</div></div>
      <div class="ms"><div class="ms-n" id="mCoins" style="color:var(--yellow)">0</div><div class="ms-l">Coins</div></div>
      <div class="ms"><div class="ms-n" id="mTime" style="color:var(--blue)">0s</div><div class="ms-l">Time</div></div>
    </div>
    <div class="modal-btns">
      <button class="modal-btn modal-btn-next" id="nextBtn" onclick="nextLevel()">▶ Next Level</button>
      <button class="modal-btn modal-btn-games" onclick="location.href='dyslexia-games.html'">🎮 All Games</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════
//  WORD DATA — emoji fallbacks so no broken images
// ══════════════════════════════════════════
const LEVELS = {
  easy:[
    [{w:"tree",e:"🌳",h:"It grows in a garden"},{w:"book",e:"📚",h:"You read it"},{w:"sun",e:"☀️",h:"It shines in the sky"},{w:"ball",e:"⚽",h:"You play with it"},{w:"fish",e:"🐟",h:"It swims in water"}],
    [{w:"dog",e:"🐶",h:"A pet that barks"},{w:"cat",e:"🐱",h:"A pet that meows"},{w:"cow",e:"🐄",h:"It gives milk"},{w:"hen",e:"🐔",h:"It lays eggs"},{w:"rat",e:"🐭",h:"A small rodent"}],
    [{w:"pen",e:"🖊️",h:"You write with it"},{w:"cup",e:"☕",h:"You drink from it"},{w:"hat",e:"🎩",h:"You wear it on head"},{w:"bag",e:"👜",h:"You carry things in it"},{w:"box",e:"📦",h:"A container for storage"}],
    [{w:"car",e:"🚗",h:"A vehicle on roads"},{w:"bus",e:"🚌",h:"A big public vehicle"},{w:"bike",e:"🚲",h:"You pedal this"},{w:"ship",e:"🚢",h:"It sails on water"},{w:"train",e:"🚆",h:"Runs on railway tracks"}],
  ],
  medium:[
    [{w:"apple",e:"🍎",h:"A red or green fruit"},{w:"chair",e:"🪑",h:"You sit on it"},{w:"bread",e:"🍞",h:"You eat it at breakfast"},{w:"plant",e:"🌿",h:"It grows with water"},{w:"clock",e:"🕐",h:"It shows time"}],
    [{w:"school",e:"🏫",h:"Where students learn"},{w:"teacher",e:"👩‍🏫",h:"Who teaches you"},{w:"library",e:"📚",h:"A place with many books"},{w:"student",e:"🎓",h:"A person who learns"},{w:"pencil",e:"✏️",h:"You draw with it"}],
    [{w:"bridge",e:"🌉",h:"It connects two places"},{w:"market",e:"🏪",h:"A place to buy things"},{w:"garden",e:"🌻",h:"Flowers grow here"},{w:"temple",e:"🛕",h:"A place of worship"},{w:"forest",e:"🌲",h:"Many trees together"}],
  ],
  hard:[
    [{w:"elephant",e:"🐘",h:"Biggest land animal"},{w:"computer",e:"💻",h:"Electronic device"},{w:"mountain",e:"⛰️",h:"Very tall land formation"},{w:"butterfly",e:"🦋",h:"Colorful flying insect"},{w:"astronaut",e:"👨‍🚀",h:"Person who goes to space"}],
    [{w:"environment",e:"🌍",h:"Our natural surroundings"},{w:"pollution",e:"🏭",h:"Harmful to our air"},{w:"recycle",e:"♻️",h:"Reuse materials"},{w:"oxygen",e:"💨",h:"Gas we breathe"},{w:"planet",e:"🪐",h:"Earth is one of these"}],
    [{w:"laboratory",e:"🔬",h:"Where scientists work"},{w:"experiment",e:"⚗️",h:"A test or trial"},{w:"chemistry",e:"🧪",h:"Science of substances"},{w:"biology",e:"🧬",h:"Study of living things"},{w:"physics",e:"⚡",h:"Study of energy and matter"}],
  ]
};

// ══════════════════════════════════════════
//  AUTH & KEYS
// ══════════════════════════════════════════
const sid = sessionStorage.getItem('studentId');
const studentName = sessionStorage.getItem('studentName');

if(!sid){
   location.href='student-login.html';
}

document.getElementById('stuId').textContent = studentName;

const HISTORY_KEY     = 'ml-history-'+sid;
const LEVEL_KEY       = 'level-status-'+sid;
const COINS_KEY       = 'coins-'+sid;
const GAMES_PLAYED_KEY= 'gamesPlayed-'+sid;

// ══════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════
let coins   = Number(localStorage.getItem(COINS_KEY))||0;
let status  = JSON.parse(localStorage.getItem(LEVEL_KEY)||'{}');
let mode='easy', level=0, q=0, correct=0, wrong=0;
let streak=0, sessionCoins=0, startTime=Date.now(), locked=false;

// init status
['easy','medium','hard'].forEach(m=>{
  if(!status[m]){
    status[m]=LEVELS[m].map((_,i)=>({unlocked:i===0,completed:false}));
  }
});

// ══════════════════════════════════════════
//  RENDER LEVEL TABS
// ══════════════════════════════════════════
function renderTabs(){
  const wrap=document.getElementById('levelTabs');
  wrap.innerHTML='';
  ['easy','medium','hard'].forEach(m=>{
    status[m].forEach((lv,i)=>{
      const b=document.createElement('button');
      const isActive=mode===m && level===i;
      b.className='lvl-tab'+(!lv.unlocked?' locked':lv.completed?' completed':'')+(isActive?' active':'');
      b.textContent=(m==='easy'?'🟢':m==='medium'?'🟡':'🔴')+' '+m.charAt(0).toUpperCase()+m.slice(1)+' '+(i+1);
      b.onclick=()=>{
        if(!lv.unlocked)return;
        mode=m;level=i;q=0;correct=0;wrong=0;streak=0;sessionCoins=0;
        startTime=Date.now();locked=false;
        renderTabs();loadQ();
      };
      wrap.appendChild(b);
    });
  });
}

// ══════════════════════════════════════════
//  MASK WORD
// ══════════════════════════════════════════
function maskWord(word){
  const idx=Math.floor(Math.random()*(word.length-2))+1;
  const parts=word.split('').map((c,i)=>
    i===idx?`<span class="blank">_</span>`:c
  );
  return {html:parts.join(''), idx};
}
let currentMask=null;

// ══════════════════════════════════════════
//  LOAD QUESTION
// ══════════════════════════════════════════
function loadQ(){
  const item=LEVELS[mode][level][q];
  const {html,idx}=maskWord(item.w);
  currentMask=idx;

  // word display
  document.getElementById('wordDisplay').innerHTML=html;

  // image / emoji
  const ic=document.getElementById('imgContainer');
  ic.innerHTML=`<div class="img-emoji">${item.e}</div>`;
  document.getElementById('imgLabel').textContent=item.h;

  // HUD
  const modeLabels={easy:'Easy Mode',medium:'Medium Mode',hard:'Hard Mode'};
  const modeCls={easy:'easy',medium:'medium',hard:'hard'};
  document.getElementById('hudMode').textContent=mode.charAt(0).toUpperCase()+mode.slice(1);
  document.getElementById('hudLevel').textContent=level+1;
  document.getElementById('hudQ').textContent=(q+1)+'/'+LEVELS[mode][level].length;
  document.getElementById('hudScoreVal').textContent=correct;
  document.getElementById('hudWrongVal').textContent=wrong;
  document.getElementById('hudCoinsVal').textContent=coins;
  document.getElementById('modeBadge').textContent=modeLabels[mode];
  document.getElementById('modeBadge').className='mode-badge '+modeCls[mode];

  // session progress bar
  const total=LEVELS[mode][level].length;
  const pct=Math.round((q/total)*100);
  document.getElementById('spFill').style.width=pct+'%';
  document.getElementById('spLabel').textContent=q+'/'+total;
  document.getElementById('sessionCoins').textContent=sessionCoins;

  // streak
  const sb=document.getElementById('streakBadge');
  if(streak>=2){sb.style.display='flex';document.getElementById('streakCount').textContent=streak}
  else sb.style.display='none';

  // reset
  document.getElementById('answerInput').value='';
  document.getElementById('answerInput').focus();
  const fb=document.getElementById('feedback');
  fb.textContent='';fb.className='feedback';
  document.getElementById('hintStrip').classList.remove('show');
  document.getElementById('hintText').textContent=item.h;
}

// ══════════════════════════════════════════
//  CHECK ANSWER
// ══════════════════════════════════════════
function checkAnswer(){
  if(locked)return;
  const item=LEVELS[mode][level][q];
  const ans=document.getElementById('answerInput').value.trim().toLowerCase();
  const word=item.w;
  const fb=document.getElementById('feedback');
  const gc=document.getElementById('gameCard');

  if(!ans){
    fb.textContent='⚠️ Please type your answer first!';
    fb.className='feedback';
    document.getElementById('hintStrip').classList.add('show');
    return;
  }

  locked=true;
  let ok=false;
  if(ans===word)ok=true;
  else if(ans.length===1&&ans===word[currentMask])ok=true;

  if(ok){
    correct++;streak++;
    const bonus=streak>=3?10:5;
    coins+=bonus;sessionCoins+=bonus;
    fb.textContent=streak>=3?`🔥 ${streak}x Streak! +${bonus} coins! Amazing!`:`✅ Correct! +${bonus} coins!`;
    fb.className='feedback ok';
    gc.classList.add('correct-flash');
    spawnConfetti(15);
    playSound('ok');
  }else{
    wrong++;streak=0;
    fb.textContent=`❌ Not quite! The answer is "${word}"`;
    fb.className='feedback bad';
    gc.classList.add('wrong-flash');
    document.getElementById('hintStrip').classList.add('show');
    playSound('bad');
  }

  saveAll();
  document.getElementById('hudCoinsVal').textContent=coins;
  document.getElementById('sessionCoins').textContent=sessionCoins;

  setTimeout(()=>{
    gc.classList.remove('correct-flash','wrong-flash');
    locked=false;q++;
    if(q>=LEVELS[mode][level].length)showComplete();
    else loadQ();
  },800);
}

function skipQ(){
  if(locked)return;
  streak=0;q++;
  if(q>=LEVELS[mode][level].length)showComplete();
  else loadQ();
}

// ══════════════════════════════════════════
//  LEVEL COMPLETE
// ══════════════════════════════════════════
function showComplete(){
  const total=LEVELS[mode][level].length;
  const acc=Math.round((correct/Math.max(1,correct+wrong))*100);
  const elapsed=Math.floor((Date.now()-startTime)/1000);

  // save progress
  const hist=JSON.parse(localStorage.getItem(HISTORY_KEY)||'[]');
  hist.push({
    game:'Missing Letter',mode,level:level+1,
    accuracy:acc,correct,wrong,
    coins:sessionCoins,time:elapsed,questions:total,
    date:new Date().toLocaleDateString(),ts:Date.now()
  });
  localStorage.setItem(HISTORY_KEY,JSON.stringify(hist));

  let gp=Number(localStorage.getItem(GAMES_PLAYED_KEY)||0)+1;
  localStorage.setItem(GAMES_PLAYED_KEY,gp);

  // unlock next
  status[mode][level].completed=true;
  if(status[mode][level+1])status[mode][level+1].unlocked=true;
  if(mode==='easy'&&level===LEVELS.easy.length-1)status.medium[0].unlocked=true;
  if(mode==='medium'&&level===LEVELS.medium.length-1)status.hard[0].unlocked=true;
  saveAll();

  // also save to Flask API if online
  saveToAPI(acc,elapsed,total);

  // show modal
  const isPerf=acc===100;
  document.getElementById('modalEmoji').textContent=isPerf?'🏆':acc>=80?'🎉':'😊';
  document.getElementById('modalTitle').textContent=isPerf?'Perfect Score!':acc>=80?'Level Complete!':'Good Effort!';
  document.getElementById('modalSub').textContent=isPerf?'Amazing! You got every answer correct!':acc>=80?'Great job! You\'re making excellent progress!':'Keep practicing — you\'ll get even better!';
  document.getElementById('mAccuracy').textContent=acc+'%';
  document.getElementById('mCoins').textContent='+'+sessionCoins+'🪙';
  document.getElementById('mTime').textContent=elapsed+'s';

  // next btn
  const hasNext=status[mode][level+1]||false;
  const nb=document.getElementById('nextBtn');
  nb.textContent=hasNext?'▶ Next Level':'🎮 All Games';
  nb.onclick=hasNext?nextLevel:()=>location.href='dyslexia-games.html';

  spawnConfetti(40);
  document.getElementById('modalWrap').classList.add('open');
  playSound('win');
}

async function saveToAPI(acc,elapsed,total){
  try{
    await fetch('http://127.0.0.1:5000/save-progress',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        student_id:sid,game:'missing-letter',mode,level:level+1,
        accuracy:acc,coins:sessionCoins,session_time:elapsed,
        questions:total,correct,wrong
      }),
      signal:AbortSignal.timeout(3000)
    });
  }catch{/*silent — localStorage is the backup*/}
}

function nextLevel(){
  document.getElementById('modalWrap').classList.remove('open');
  q=0;correct=0;wrong=0;streak=0;sessionCoins=0;startTime=Date.now();

  // advance
  if(level+1<LEVELS[mode].length)level++;
  else if(mode==='easy')     {mode='medium';level=0}
  else if(mode==='medium')   {mode='hard';level=0}

  renderTabs();loadQ();
}

// ══════════════════════════════════════════
//  STORAGE
// ══════════════════════════════════════════
function saveAll(){
  localStorage.setItem(LEVEL_KEY,JSON.stringify(status));
  localStorage.setItem(COINS_KEY,coins);
}

// ══════════════════════════════════════════
//  SPEECH
// ══════════════════════════════════════════
let speakTimeout=null;
function speakQ(){
  const item=LEVELS[mode][level][q];
  const btn=document.getElementById('speakBtn');
  window.speechSynthesis.cancel();
  if(speakTimeout)clearTimeout(speakTimeout);
  btn.classList.add('speaking');
  const u=new SpeechSynthesisUtterance(`Find the missing letter in the word: ${item.w}`);
  u.rate=0.75;u.pitch=1;u.lang='en-US';
  u.onend=()=>{btn.classList.remove('speaking')};
  window.speechSynthesis.speak(u);
  speakTimeout=setTimeout(()=>btn.classList.remove('speaking'),5000);
}

// ══════════════════════════════════════════
//  SOUNDS (Web Audio API)
// ══════════════════════════════════════════
function playSound(type){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const osc=ctx.createOscillator();
    const gain=ctx.createGain();
    osc.connect(gain);gain.connect(ctx.destination);
    if(type==='ok'){osc.frequency.setValueAtTime(523,ctx.currentTime);osc.frequency.setValueAtTime(659,ctx.currentTime+.1);osc.frequency.setValueAtTime(784,ctx.currentTime+.2)}
    else if(type==='bad'){osc.frequency.setValueAtTime(300,ctx.currentTime);osc.frequency.setValueAtTime(200,ctx.currentTime+.15)}
    else{[523,659,784,1047].forEach((f,i)=>osc.frequency.setValueAtTime(f,ctx.currentTime+i*.08))}
    gain.gain.setValueAtTime(.3,ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.5);
    osc.start();osc.stop(ctx.currentTime+.5);
  }catch{}
}

// ══════════════════════════════════════════
//  CONFETTI
// ══════════════════════════════════════════
function spawnConfetti(count){
  const wrap=document.getElementById('confettiWrap');
  wrap.classList.add('show');
  const colors=['#00e676','#40c4ff','#ffd740','#ff7043','#ea80fc','#fff'];
  for(let i=0;i<count;i++){
    const d=document.createElement('div');
    d.className='conf-dot';
    const sz=6+Math.random()*10;
    Object.assign(d.style,{
      width:sz+'px',height:sz+'px',borderRadius:Math.random()>.5?'50%':'2px',
      left:Math.random()*100+'vw',top:'-20px',
      background:colors[Math.floor(Math.random()*colors.length)],
      animationDuration:(1.5+Math.random()*2)+'s',
      animationDelay:Math.random()*.5+'s',
    });
    wrap.appendChild(d);
    setTimeout(()=>d.remove(),3000);
  }
  setTimeout(()=>wrap.classList.remove('show'),3000);
}

// ══════════════════════════════════════════
//  KEYBOARD
// ══════════════════════════════════════════
document.addEventListener('keydown',e=>{
  if(e.key==='Enter')checkAnswer();
  if(e.key==='Escape')skipQ();
});

// ══════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════
renderTabs();
loadQ();
</script>
