<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>ESLD – Messages</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0b1120;--sidebar:#0f172a;--card:rgba(255,255,255,.07);--border:rgba(255,255,255,.12);--radius:18px;--green:#22c55e;--blue:#38bdf8;--purple:#a78bfa;--yellow:#fbbf24;--orange:#fb923c;--red:#ef4444}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:#f1f5f9;min-height:100vh;display:grid;grid-template-columns:240px 1fr;grid-template-rows:auto 1fr}
.sidebar{grid-row:1/-1;background:var(--sidebar);border-right:1px solid var(--border);padding:18px 12px;display:flex;flex-direction:column;gap:4px;position:sticky;top:0;height:100vh;overflow-y:auto}
.sidebar-logo{font-family:'Fredoka One';font-size:1.4rem;padding:8px 8px 16px;border-bottom:1px solid var(--border);margin-bottom:8px;background:linear-gradient(90deg,var(--green),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;cursor:pointer;transition:.2s;font-weight:700;font-size:.86rem;color:#64748b;border:none;background:none;width:100%;text-align:left;font-family:'Nunito',sans-serif}
.nav-item:hover{background:rgba(255,255,255,.07);color:#f1f5f9}
.nav-item.active{background:rgba(56,189,248,.12);color:var(--blue)}
.nav-item span:first-child{font-size:18px}
.sidebar-coins{margin-top:auto;background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.2);border-radius:14px;padding:14px;text-align:center}
.coins-num{font-family:'Fredoka One';font-size:2rem;color:var(--yellow)}
.coins-label{font-size:.78rem;color:#64748b;margin-top:2px}
.topbar{grid-column:2;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:rgba(15,23,42,.65);backdrop-filter:blur(12px);position:sticky;top:0;z-index:10}
.topbar h2{font-family:'Fredoka One';font-size:1.35rem}
main{grid-column:2;padding:20px 24px;overflow-y:auto;max-height:calc(100vh - 60px)}

/* LAYOUT */
.msg-layout{display:grid;grid-template-columns:320px 1fr;gap:16px;height:calc(100vh - 130px)}

/* CONVERSATIONS LIST */
.conv-panel{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);display:flex;flex-direction:column;overflow:hidden}
.conv-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.conv-header h4{font-family:'Fredoka One';font-size:.95rem}
.new-msg-btn{padding:6px 12px;border-radius:999px;border:none;background:linear-gradient(135deg,var(--blue),var(--purple));color:#fff;font-weight:800;font-size:.76rem;cursor:pointer;font-family:'Nunito',sans-serif;transition:.2s}
.new-msg-btn:hover{transform:scale(1.05)}
.conv-search{padding:10px 14px;border-bottom:1px solid var(--border)}
.conv-search input{width:100%;padding:8px 12px;border-radius:999px;border:1px solid var(--border);background:rgba(0,0,0,.3);color:#f1f5f9;font-family:'Nunito',sans-serif;font-size:.82rem;outline:none}
.conv-search input:focus{border-color:var(--blue)}
.conv-list{flex:1;overflow-y:auto}
.conv-item{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.04);transition:.2s;position:relative}
.conv-item:hover{background:rgba(255,255,255,.05)}
.conv-item.active{background:rgba(56,189,248,.08);border-left:3px solid var(--blue)}
.conv-av{width:40px;height:40px;border-radius:50%;display:grid;place-items:center;font-size:18px;flex-shrink:0;font-weight:900}
.conv-info{flex:1;min-width:0}
.conv-name{font-weight:800;font-size:.88rem;margin-bottom:2px}
.conv-preview{color:#64748b;font-size:.76rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.conv-time{font-size:.7rem;color:#475569;white-space:nowrap;margin-left:4px}
.unread-badge{width:18px;height:18px;border-radius:50%;background:var(--blue);color:#fff;font-size:.65rem;font-weight:900;display:grid;place-items:center;flex-shrink:0}

/* CHAT PANEL */
.chat-panel{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);display:flex;flex-direction:column;overflow:hidden}
.chat-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.chat-av{width:38px;height:38px;border-radius:50%;display:grid;place-items:center;font-size:16px;font-weight:900}
.chat-name h4{font-weight:800;font-size:.95rem;margin-bottom:1px}
.chat-name .status{font-size:.72rem;color:var(--green);display:flex;align-items:center;gap:4px}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.chat-actions{margin-left:auto;display:flex;gap:6px}
.icon-btn{background:rgba(255,255,255,.07);border:1px solid var(--border);border-radius:999px;color:#94a3b8;cursor:pointer;font-size:14px;padding:6px 10px;transition:.2s;font-family:'Nunito',sans-serif}
.icon-btn:hover{background:rgba(255,255,255,.14);color:#f1f5f9}

/* MESSAGES */
.chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.msg-group{display:flex;flex-direction:column;gap:4px}
.msg-row{display:flex;align-items:flex-end;gap:8px}
.msg-row.sent{flex-direction:row-reverse}
.msg-bubble{max-width:70%;padding:10px 14px;border-radius:18px;font-size:.88rem;line-height:1.5;position:relative;word-break:break-word}
.msg-row.recv .msg-bubble{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);border-bottom-left-radius:4px}
.msg-row.sent .msg-bubble{background:linear-gradient(135deg,rgba(56,189,248,.25),rgba(167,139,250,.2));border:1px solid rgba(56,189,248,.2);border-bottom-right-radius:4px;text-align:right}
.msg-time{font-size:.68rem;color:#475569;white-space:nowrap;margin-bottom:2px}
.msg-row.sent .msg-time{text-align:right}
.msg-mini-av{width:28px;height:28px;border-radius:50%;display:grid;place-items:center;font-size:12px;font-weight:900;flex-shrink:0}
.read-tick{font-size:.7rem;color:var(--blue);margin-top:2px;text-align:right}

/* DATE SEPARATOR */
.date-sep{text-align:center;font-size:.72rem;color:#475569;font-weight:700;padding:4px 0;display:flex;align-items:center;gap:10px}
.date-sep::before,.date-sep::after{content:'';flex:1;height:1px;background:var(--border)}

/* TYPING INDICATOR */
.typing-indicator{display:none;align-items:center;gap:8px;padding:4px 0}
.typing-indicator.show{display:flex}
.t-av{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--purple));display:grid;place-items:center;font-size:12px}
.t-dots{display:flex;gap:4px;padding:10px 14px;background:rgba(255,255,255,.08);border-radius:18px;border-bottom-left-radius:4px}
.t-dot{width:7px;height:7px;border-radius:50%;background:#64748b;animation:typeDot 1.2s infinite}
.t-dot:nth-child(2){animation-delay:.2s}
.t-dot:nth-child(3){animation-delay:.4s}
@keyframes typeDot{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}

/* INPUT AREA */
.chat-input-area{padding:12px 16px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:8px}
.quick-replies{display:flex;gap:6px;flex-wrap:wrap}
.qr-btn{padding:5px 12px;border-radius:999px;border:1px solid rgba(56,189,248,.25);background:rgba(56,189,248,.08);color:var(--blue);font-size:.74rem;font-weight:700;cursor:pointer;transition:.2s;font-family:'Nunito',sans-serif}
.qr-btn:hover{background:rgba(56,189,248,.18)}
.input-row{display:flex;gap:8px;align-items:flex-end}
.msg-textarea{flex:1;padding:10px 14px;border-radius:14px;border:1px solid var(--border);background:rgba(0,0,0,.3);color:#f1f5f9;font-family:'Nunito',sans-serif;font-size:.88rem;outline:none;resize:none;min-height:42px;max-height:120px;transition:.2s;line-height:1.4}
.msg-textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(56,189,248,.1)}
.send-btn{padding:10px 18px;border-radius:999px;border:none;background:linear-gradient(135deg,var(--blue),var(--purple));color:#fff;font-weight:900;cursor:pointer;font-family:'Nunito',sans-serif;font-size:.88rem;transition:.3s;white-space:nowrap;height:42px}
.send-btn:hover{transform:scale(1.05);box-shadow:0 4px 16px rgba(56,189,248,.35)}
.send-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.attach-btn{padding:10px;border-radius:999px;border:1px solid var(--border);background:rgba(255,255,255,.06);color:#94a3b8;cursor:pointer;font-size:16px;transition:.2s;height:42px}
.attach-btn:hover{background:rgba(255,255,255,.12);color:#f1f5f9}

/* NEW MESSAGE MODAL */
.overlay{position:fixed;inset:0;background:rgba(2,6,23,.9);backdrop-filter:blur(14px);z-index:1000;display:none;place-items:center}
.overlay.open{display:grid}
.modal{background:#0f172a;border:1px solid var(--border);border-radius:22px;padding:26px;width:min(520px,95vw)}
.modal h3{font-family:'Fredoka One';font-size:1.25rem;margin-bottom:16px}
.form-group{margin-bottom:12px}
label{display:block;font-size:.75rem;font-weight:800;color:#64748b;margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
select,input[type=text],textarea{width:100%;padding:10px 13px;border-radius:12px;border:1px solid var(--border);background:rgba(0,0,0,.3);color:#f1f5f9;font-family:'Nunito',sans-serif;font-size:.88rem;outline:none;transition:.2s}
select:focus,input:focus,textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(56,189,248,.1)}
select option{background:#0f172a}
textarea{resize:vertical;min-height:90px}
.btn-row{display:flex;gap:8px;margin-top:14px}
.btn{padding:9px 18px;border-radius:999px;border:1px solid var(--border);background:transparent;color:#94a3b8;cursor:pointer;font-weight:700;font-family:'Nunito',sans-serif;font-size:.85rem;transition:.2s}
.btn:hover{background:rgba(255,255,255,.1);color:#f1f5f9}
.btn.primary{background:linear-gradient(135deg,var(--blue),var(--purple));border:none;color:#fff}

/* EMPTY STATE */
.empty-chat{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#475569;text-align:center;gap:8px}
.empty-chat .big{font-size:52px}

@media(max-width:900px){body{grid-template-columns:1fr}.sidebar{display:none}.topbar{grid-column:1}main{grid-column:1;padding:12px}.msg-layout{grid-template-columns:1fr;height:auto}.conv-panel{height:260px}.chat-panel{height:60vh}}
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-logo">🦋 ESLD</div>
  <button class="nav-item" onclick="location.href='student-dashboard.html'"><span>🏠</span>Dashboard</button>
  <button class="nav-item" onclick="location.href='student-games.html'"><span>🎮</span>Games</button>
  <button class="nav-item" onclick="location.href='student-assignments.html'"><span>📋</span>Assignments</button>
  <button class="nav-item active"><span>💬</span>Messages</button>
  <button class="nav-item" onclick="location.href='student-progress.html'"><span>📊</span>Progress</button>
  <button class="nav-item" onclick="location.href='leaderboard.html'"><span>🏆</span>Leaderboard</button>
  <button class="nav-item" onclick="logout()"><span>🚪</span>Logout</button>
  <div class="sidebar-coins">
    <div class="coins-num" id="sideCoins">0</div>
    <div class="coins-label">🪙 Coins Earned</div>
  </div>
</aside>

<div class="topbar">
  <h2>💬 Messages</h2>
  <span style="color:#64748b;font-size:.85rem" id="stuLabel"></span>
</div>

<main>
  <div class="msg-layout">

    <!-- CONVERSATIONS LIST -->
    <div class="conv-panel">
      <div class="conv-header">
        <h4>💬 Conversations</h4>
        <button class="new-msg-btn" onclick="openNewMsg()">✏️ New</button>
      </div>
      <div class="conv-search">
        <input placeholder="🔍 Search…" oninput="searchConv(this.value)"/>
      </div>
      <div class="conv-list" id="convList"></div>
    </div>

    <!-- CHAT AREA -->
    <div class="chat-panel" id="chatPanel">
      <div class="empty-chat">
        <div class="big">💬</div>
        <div style="font-family:'Fredoka One';font-size:1.1rem">Select a conversation</div>
        <div style="font-size:.85rem">or start a new message</div>
        <button class="new-msg-btn" style="margin-top:8px" onclick="openNewMsg()">✏️ New Message</button>
      </div>
    </div>

  </div>
</main>

<!-- NEW MESSAGE MODAL -->
<div class="overlay" id="newMsgModal">
  <div class="modal">
    <h3>✏️ New Message</h3>
    <div class="form-group">
      <label>Send To</label>
      <select id="nmTo">
        <option value="teacher">👩‍🏫 My Teacher (Ms. Priya Sharma)</option>
        <option value="parent">👨‍👩‍👧 My Parent</option>
        <option value="admin">🏫 School Admin</option>
      </select>
    </div>
    <div class="form-group">
      <label>Category</label>
      <select id="nmCategory">
        <option value="doubt">❓ I have a doubt</option>
        <option value="help">🆘 I need help</option>
        <option value="assignment">📋 Assignment question</option>
        <option value="progress">📊 About my progress</option>
        <option value="other">💬 Other</option>
      </select>
    </div>
    <div class="form-group">
      <label>Subject</label>
      <input type="text" id="nmSubject" placeholder="e.g., Question about Missing Letter game"/>
    </div>
    <div class="form-group">
      <label>Message</label>
      <textarea id="nmBody" placeholder="Write your message here…"></textarea>
    </div>
    <div class="btn-row">
      <button class="btn primary" onclick="sendNewMsg()">📨 Send Message</button>
      <button class="btn" onclick="closeNewMsg()">Cancel</button>
    </div>
  </div>
</div>

<script>
// ── AUTH ──
const sid   = sessionStorage.getItem('studentId')  || 'STU-DEMO-001';
const sname = sessionStorage.getItem('studentName')|| 'Student';
document.getElementById('stuLabel').textContent='👤 '+sname;
document.getElementById('sideCoins').textContent=Number(localStorage.getItem('coins-'+sid))||0;

// ── STORAGE KEYS ──
const MSG_KEY='student-messages-'+sid;

// ── CONVERSATIONS DATA ──
// Load from localStorage (persisted messages)
function loadConversations(){
  const stored=JSON.parse(localStorage.getItem(MSG_KEY)||'null');
  if(stored)return stored;
  // Default conversations
  return[
    {
      id:'conv-teacher',
      name:'Ms. Priya Sharma',
      role:'👩‍🏫 Teacher',
      avatar:'👩‍🏫',
      avatarBg:'linear-gradient(135deg,#38bdf8,#a78bfa)',
      unread:1,
      messages:[
        {id:'m1',from:'teacher',text:'Hello! How are you doing with the Missing Letter game? Keep up the great work! 🌟',time:'Yesterday 10:00 AM',read:true},
        {id:'m2',from:'student',text:'Hi teacher! I completed Level 2. It was a bit hard but I got 80% accuracy!',time:'Yesterday 10:05 AM',read:true},
        {id:'m3',from:'teacher',text:'That is wonderful! 80% is excellent! Try Level 3 next. I have also assigned you a new activity – Letter Confusion Practice. Check it out! 📝',time:'Yesterday 10:08 AM',read:false},
      ]
    },
    {
      id:'conv-parent',
      name:'My Parent',
      role:'👨‍👩‍👧 Parent',
      avatar:'👪',
      avatarBg:'linear-gradient(135deg,#22c55e,#38bdf8)',
      unread:0,
      messages:[
        {id:'p1',from:'teacher',text:'Hi! Your teacher sent a message: "Arjun is making great progress in reading. Please encourage 20 minutes of practice daily."',time:'2 days ago',read:true},
        {id:'p2',from:'student',text:'Thanks mom/dad! I will practice every day!',time:'2 days ago',read:true},
      ]
    },
    {
      id:'conv-admin',
      name:'School Admin',
      role:'🏫 Admin',
      avatar:'🏫',
      avatarBg:'linear-gradient(135deg,#fb923c,#ef4444)',
      unread:0,
      messages:[
        {id:'ad1',from:'teacher',text:'Welcome to ESLD Learning Platform! We are here to help you learn and grow. 🎉',time:'3 days ago',read:true},
      ]
    }
  ];
}

let CONVS=loadConversations();
let activeConvId=null;

function saveConvs(){localStorage.setItem(MSG_KEY,JSON.stringify(CONVS))}

// ── RENDER CONVERSATIONS LIST ──
function renderConvList(filter=''){
  const el=document.getElementById('convList');
  const list=CONVS.filter(c=>!filter||c.name.toLowerCase().includes(filter.toLowerCase()));
  if(!list.length){el.innerHTML=`<div style="text-align:center;padding:30px;color:#64748b;font-size:.85rem">No conversations found</div>`;return}
  el.innerHTML=list.map(c=>{
    const last=c.messages[c.messages.length-1];
    const preview=last?(last.from==='student'?'You: ':'')+last.text:'Start a conversation';
    return`<div class="conv-item${c.id===activeConvId?' active':''}" onclick="openConv('${c.id}')">
      <div class="conv-av" style="background:${c.avatarBg}">${c.avatar}</div>
      <div class="conv-info">
        <div class="conv-name">${c.name}</div>
        <div class="conv-preview">${preview.substring(0,40)}${preview.length>40?'…':''}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
        <span class="conv-time">${last?last.time.split(' ').slice(-2).join(' '):''}</span>
        ${c.unread>0?`<span class="unread-badge">${c.unread}</span>`:''}
      </div>
    </div>`;
  }).join('');
}
renderConvList();

function searchConv(q){renderConvList(q)}

// ── OPEN CONVERSATION ──
function openConv(cid){
  activeConvId=cid;
  const c=CONVS.find(x=>x.id===cid);
  if(!c)return;
  // Mark all as read
  c.messages.forEach(m=>m.read=true);
  c.unread=0;
  saveConvs();
  renderConvList();

  const QUICK_REPLIES={
    'conv-teacher':['I have a doubt 🤔','I completed the assignment ✅','Can you help me? 🙏','Thank you teacher! 😊','I need more practice 📚'],
    'conv-parent': ['I finished my homework ✅','I earned coins today! 🪙','I need help with this 🙏'],
    'conv-admin':  ['I have a question ❓','Thank you! 😊'],
  };
  const qrs=QUICK_REPLIES[cid]||[];

  document.getElementById('chatPanel').innerHTML=`
    <div class="chat-header">
      <div class="chat-av" style="background:${c.avatarBg}">${c.avatar}</div>
      <div class="chat-name">
        <h4>${c.name}</h4>
        <div class="status"><div class="status-dot"></div> ${c.role}</div>
      </div>
      <div class="chat-actions">
        <button class="icon-btn" onclick="speakLastMsg('${cid}')">🔊</button>
        <button class="icon-btn" onclick="clearChat('${cid}')">🗑️</button>
      </div>
    </div>
    <div class="chat-messages" id="chatMsgs">${renderMsgs(c)}</div>
    <div class="typing-indicator" id="typingInd">
      <div class="t-av">${c.avatar}</div>
      <div class="t-dots"><div class="t-dot"></div><div class="t-dot"></div><div class="t-dot"></div></div>
    </div>
    <div class="chat-input-area">
      <div class="quick-replies">${qrs.map(r=>`<button class="qr-btn" onclick="useQuickReply('${r.replace(/'/g,"\\'")}')">${r}</button>`).join('')}</div>
      <div class="input-row">
        <button class="attach-btn" onclick="alert('📎 File attachment coming soon!')">📎</button>
        <textarea class="msg-textarea" id="msgInput" placeholder="Type your message…" rows="1" onkeydown="handleKey(event)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMsg()">Send ✈️</button>
      </div>
    </div>`;

  scrollToBottom();
}

function renderMsgs(c){
  let html='';
  let lastDate='';
  c.messages.forEach(m=>{
    const dateStr=m.time.split(' ')[0]==='Yesterday'?'Yesterday':m.time.includes('days')?m.time:m.time.split(' ')[0];
    if(dateStr!==lastDate){
      html+=`<div class="date-sep">${dateStr}</div>`;
      lastDate=dateStr;
    }
    const isStu=m.from==='student';
    html+=`<div class="msg-group">
      <div class="msg-row ${isStu?'sent':'recv'}">
        ${!isStu?`<div class="msg-mini-av" style="background:${CONVS.find(x=>x.messages.includes(m))?.avatarBg||'#38bdf8'}">${CONVS.find(x=>x.messages.includes(m))?.avatar||'👩‍🏫'}</div>`:''}
        <div>
          <div class="msg-time">${m.time}</div>
          <div class="msg-bubble">${m.text}</div>
          ${isStu?`<div class="read-tick">${m.read?'✓✓':'✓'}</div>`:''}
        </div>
        ${isStu?`<div class="msg-mini-av" style="background:linear-gradient(135deg,var(--purple),var(--blue))">${sname[0]}</div>`:''}
      </div>
    </div>`;
  });
  return html;
}

// ── SEND MESSAGE ──
function sendMsg(){
  if(!activeConvId)return;
  const input=document.getElementById('msgInput');
  const text=input?.value.trim();
  if(!text)return;

  const c=CONVS.find(x=>x.id===activeConvId);
  if(!c)return;

  const now=new Date();
  const timeStr='Today '+now.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
  const msg={id:'m'+Date.now(),from:'student',text,time:timeStr,read:false};
  c.messages.push(msg);
  saveConvs();

  input.value='';
  input.style.height='auto';

  // Re-render
  document.getElementById('chatMsgs').innerHTML=renderMsgs(c);
  scrollToBottom();

  // Save to teacher-inbox (teacher dashboard reads this)
  const teacherInbox=JSON.parse(localStorage.getItem('teacher-inbox')||'[]');
  teacherInbox.unshift({from:sname,studentId:sid,body:text,time:timeStr,read:false,convId:activeConvId});
  localStorage.setItem('teacher-inbox',JSON.stringify(teacherInbox));

  // Simulate teacher reply after 1.5-3s
  if(activeConvId==='conv-teacher'){
    document.getElementById('typingInd')?.classList.add('show');
    const delay=1500+Math.random()*2000;
    setTimeout(()=>{
      document.getElementById('typingInd')?.classList.remove('show');
      autoReply(c,text);
    },delay);
  }
}

function handleKey(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg()}
}

function useQuickReply(text){
  const input=document.getElementById('msgInput');
  if(input){input.value=text;input.focus()}
}

// ── AUTO REPLY (Teacher Bot) ──
const REPLIES=[
  'Great job! Keep up the amazing work! 🌟',
  'Well done! I am proud of your progress! 🎉',
  'That is a great question! Let me help you with that. 📚',
  'I have seen your progress – you are improving every day! 💪',
  'Don\'t give up! Practice makes perfect. 🔥',
  'Excellent! Try the next level game for more practice! 🎮',
  'I will check your progress and send you a new assignment! 📝',
  'Remember, every small step counts! You are doing great! ⭐',
  'I have sent you a new practice assignment. Check it out! 📋',
];

function autoReply(c,studentText){
  const now=new Date();
  const timeStr='Today '+now.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
  let reply=REPLIES[Math.floor(Math.random()*REPLIES.length)];
  // Context aware
  if(studentText.toLowerCase().includes('doubt')||studentText.toLowerCase().includes('help')) reply='Of course! Tell me what you need help with and I will explain it. 😊';
  if(studentText.toLowerCase().includes('complet')||studentText.toLowerCase().includes('finish')) reply='Wonderful! I can see your progress. You\'re doing amazing! 🏆 Check your report in My Progress.';
  if(studentText.toLowerCase().includes('hard')||studentText.toLowerCase().includes('difficult')) reply='It\'s okay if it feels hard! Take it one step at a time. Start with Easy mode. 💪 I believe in you!';
  if(studentText.toLowerCase().includes('thank')) reply='You are very welcome! Keep learning and growing! 🌈';

  const msg={id:'r'+Date.now(),from:'teacher',text:reply,time:timeStr,read:true};
  c.messages.push(msg);
  c.unread=0;
  saveConvs();

  if(document.getElementById('chatMsgs'))document.getElementById('chatMsgs').innerHTML=renderMsgs(c);
  scrollToBottom();
}

function scrollToBottom(){
  const el=document.getElementById('chatMsgs');
  if(el)setTimeout(()=>el.scrollTop=el.scrollHeight,50);
}

function clearChat(cid){
  if(!confirm('Clear this conversation?'))return;
  const c=CONVS.find(x=>x.id===cid);
  if(c){c.messages=[];saveConvs();openConv(cid)}
}

function speakLastMsg(cid){
  const c=CONVS.find(x=>x.id===cid);
  if(!c||!c.messages.length)return;
  const last=c.messages[c.messages.length-1];
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(last.text);
  u.rate=0.85;u.pitch=1.05;u.lang='en-US';
  window.speechSynthesis.speak(u);
}

// ── NEW MESSAGE MODAL ──
function openNewMsg(){document.getElementById('newMsgModal').classList.add('open')}
function closeNewMsg(){document.getElementById('newMsgModal').classList.remove('open')}

function sendNewMsg(){
  const to=document.getElementById('nmTo').value;
  const category=document.getElementById('nmCategory').value;
  const subject=document.getElementById('nmSubject').value.trim();
  const body=document.getElementById('nmBody').value.trim();
  if(!subject||!body){alert('Please fill in subject and message!');return}

  const cid=to==='teacher'?'conv-teacher':to==='parent'?'conv-parent':'conv-admin';
  const c=CONVS.find(x=>x.id===cid);
  if(!c)return;

  const now=new Date();
  const timeStr='Today '+now.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
  c.messages.push({id:'nm'+Date.now(),from:'student',text:`[${category.toUpperCase()}] ${subject}: ${body}`,time:timeStr,read:false});
  saveConvs();

  // Save to teacher-inbox
  if(to==='teacher'){
    const teacherInbox=JSON.parse(localStorage.getItem('teacher-inbox')||'[]');
    teacherInbox.unshift({from:sname,studentId:sid,body:`[${category}] ${subject}: ${body}`,time:timeStr,read:false,convId:cid});
    localStorage.setItem('teacher-inbox',JSON.stringify(teacherInbox));
  }

  document.getElementById('nmSubject').value='';
  document.getElementById('nmBody').value='';
  closeNewMsg();
  openConv(cid);
  renderConvList();
  alert('📨 Message sent successfully!');
}

function logout(){sessionStorage.clear();location.href='student-login.html'}
</script>
